name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: coffee
          POSTGRES_PASSWORD: coffee
          POSTGRES_DB: coffee_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coffee -d coffee_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://coffee:coffee@localhost:5432/coffee_app
      API_PORT: 4000
      CORS_ORIGIN: http://localhost:4173
      JWT_ACCESS_SECRET: test_access_secret_123456
      JWT_REFRESH_SECRET: test_refresh_secret_123456
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL_DAYS: 7
      RATE_LIMIT_MAX: 200
      RUN_DB_TESTS: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: API migrate and seed
        run: |
          npm run db:migrate -w apps/api
          npm run db:seed -w apps/api

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + integration tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npm run e2e -w apps/web

      - name: Lighthouse quality gates
        run: npm run lhci -w apps/web

      - name: npm audit high
        run: npm audit --audit-level=high
